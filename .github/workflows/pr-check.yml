name: PR Validation

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Current Branch
        run: echo "Running Pull Request Validation"

      - name: Display README
        run: cat README.md

      - name: Display Python Version
        run: python --version
